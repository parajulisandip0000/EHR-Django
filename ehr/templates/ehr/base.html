<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EHR Application{% endblock %}</title>
    <style>
        :root {
            --bg: #f4efe6;
            --surface: #fffdf8;
            --ink: #1f2a37;
            --muted: #6b7280;
            --brand: #0f766e;
            --brand-dark: #134e4a;
            --accent: #d97706;
            --border: #d6d3d1;
            --danger: #b91c1c;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(217, 119, 6, 0.16), transparent 28%),
                linear-gradient(180deg, #f8f5ef 0%, var(--bg) 100%);
        }
        a { color: var(--brand-dark); text-decoration: none; }
        .container { width: min(1120px, calc(100% - 2rem)); margin: 0 auto; }
        .nav {
            padding: 1rem 0;
            border-bottom: 1px solid rgba(31, 42, 55, 0.08);
            background: rgba(255, 253, 248, 0.88);
            backdrop-filter: blur(6px);
            position: sticky;
            top: 0;
        }
        .nav-inner, .actions {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .brand {
            font-size: 1.35rem;
            font-weight: 700;
            margin-right: auto;
        }
        .page { padding: 2rem 0 3rem; }
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 1.25rem;
            box-shadow: 0 18px 40px rgba(31, 42, 55, 0.06);
        }
        .grid {
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        }
        .card {
            background: linear-gradient(180deg, rgba(15, 118, 110, 0.08), rgba(255, 253, 248, 0.95));
            border: 1px solid rgba(15, 118, 110, 0.12);
            border-radius: 16px;
            padding: 1rem;
        }
        .card strong { display: block; font-size: 2rem; margin-top: 0.25rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.85rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { font-size: 0.9rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
        .btn, button {
            display: inline-block;
            padding: 0.7rem 1rem;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            background: var(--brand);
            color: white;
            font-weight: 600;
        }
        .btn-secondary { background: var(--accent); }
        .btn-danger { background: var(--danger); }
        .muted { color: var(--muted); }
        .messages { margin-bottom: 1rem; }
        .message {
            padding: 0.9rem 1rem;
            border-radius: 12px;
            margin-bottom: 0.6rem;
            background: rgba(15, 118, 110, 0.12);
        }
        label { display: block; font-weight: 600; margin-bottom: 0.35rem; }
        .form-row { margin-bottom: 1rem; }
        .form-control {
            width: 100%;
            padding: 0.8rem 0.9rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #fff;
        }
        .errorlist {
            color: var(--danger);
            margin: 0.35rem 0 0;
            padding-left: 1rem;
        }
        @media (max-width: 720px) {
            th:nth-child(4), td:nth-child(4) { display: none; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="container nav-inner">
            <a class="brand" href="{% url 'dashboard' %}">EHR Application</a>
            <a href="{% url 'patient-list' %}">Patients</a>
            <a href="{% url 'doctor-list' %}">Doctors</a>
            <a href="{% url 'hospital-list' %}">Hospitals</a>
            <a href="{% url 'registration-list' %}">Registrations</a>
            <a href="{% url 'hospital-session' %}">Session Demo</a>
            <a href="/admin/">Admin</a>
            <a href="/api/">API</a>
        </div>
    </nav>
    <main class="page">
        <div class="container">
            {% if messages %}
                <div class="messages">
                    {% for message in messages %}
                        <div class="message">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
