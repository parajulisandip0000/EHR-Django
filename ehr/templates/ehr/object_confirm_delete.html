{% extends "ehr/base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<section class="panel">
    <h1>{{ title }}</h1>
    <p>Are you sure you want to delete this {{ entity_name }}: <strong>{{ object }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <div class="actions">
            <button class="btn-danger" type="submit">Delete</button>
            <a class="btn btn-secondary" href="{{ list_url }}">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
